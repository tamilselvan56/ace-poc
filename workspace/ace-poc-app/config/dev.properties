# IBM ACE POC - DEV Environment

app.name=ace-poc-app
app.version=1.0.0
environment=DEV

ace.admin.host=localhost
ace.admin.port=7600
ace.http.port=7800

mq.queue.manager=ACEPOCQM
mq.queue.input=ACE.POC.INPUT
mq.queue.output=ACE.POC.OUTPUT
mq.queue.dlq.transient=DLQ.TRANSIENT.ACE.POC
mq.queue.dlq.permanent=DLQ.PERMANENT.ACE.POC

validation.enabled=true

retry.enabled=true
retry.max.attempts=3
retry.backoff.seconds=2

logging.structured.enabled=true
logging.level=INFO

tls.enabled=false